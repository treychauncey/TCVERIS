
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCVERIS Base Camp Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
</head>
<body>
    <header>
        <h1>TCVERIS Base Camp Calculator</h1>
        <p class="subtitle">✦ Unraveling Complexity ✦ Delivering Certainty ✦</p>
    </header>
    <main>
        <section class="inputs">
            <label for="pax">Personnel (PAX):</label>
            <input type="number" id="pax" placeholder="Enter number of personnel" />
            <label for="days">Duration (Days):</label>
            <input type="number" id="days" placeholder="Enter number of days" />
        </section>
        <section class="categories">
            <button onclick="calculate('lodging')">Lodging</button>
            <button onclick="calculate('hygiene')">Hygiene</button>
            <button onclick="calculate('food')">Food & Water</button>
        </section>
        <section class="results">
            <h2>Results:</h2>
            <div id="output"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
