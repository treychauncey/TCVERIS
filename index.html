<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCVERIS Base Camp Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.png" />
</head>
<body>
    <header>
        <h1>TCVERIS Base Camp Calculator</h1>
        <p class="subtitle">✦ Unraveling Complexity ✦ Delivering Certainty ✦</p>
    </header>
    <main>
        <section class="inputs">
            <label for="pax">Personnel (PAX):</label>
            <input type="number" id="pax" placeholder="e.g., 100" />
            <label for="days">Duration (Days):</label>
            <input type="number" id="days" placeholder="e.g., 30" />
        </section>
        <section class="tabs">
            <button onclick="showTab('lodging')">Lodging</button>
            <button onclick="showTab('hygiene')">Hygiene</button>
            <button onclick="showTab('food')">Food & Water</button>
            <button onclick="showTab('waste')">Waste</button>
            <button onclick="showTab('power')">Power</button>
            <button onclick="showTab('security')">Security</button>
            <button onclick="showTab('medical')">Medical</button>
        </section>
        <section id="results">
            <div id="lodging" class="category">Lodging Cost: $<span></span></div>
            <div id="hygiene" class="category">Hygiene Cost: $<span></span></div>
            <div id="food" class="category">Food & Water Cost: $<span></span></div>
            <div id="waste" class="category">Waste Management: $<span></span></div>
            <div id="power" class="category">Power Supply: $<span></span></div>
            <div id="security" class="category">Security: $<span></span></div>
            <div id="medical" class="category">Medical: $<span></span></div>
            <div class="grand-total">Total: $<span></span></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
